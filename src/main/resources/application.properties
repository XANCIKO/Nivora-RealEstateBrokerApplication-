# Server
server.port=8080
server.tomcat.basedir=${TOMCAT_BASE_DIR:./target/tomcat}

# Load secrets from gitignored file (credentials, API keys)
spring.config.import=optional:classpath:application-secrets.properties

# MySQL Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/realestate_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:RealEstateBrokerAppSecretKey2024SuperLongSecretKeyForHS256Algorithm}
app.jwt.expiration=86400000

# Frontend URL for email links
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

# Mail / SMTP
# Real credentials go in application-secrets.properties (gitignored)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${APP_MAIL_FROM:}

# Stripe (Test Mode)
stripe.secret-key=${STRIPE_SECRET_KEY:}

# File Uploads
app.upload.base-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Demo seed data for reviewers.
app.demo.seed.enabled=${APP_DEMO_SEED_ENABLED:true}

# Logging
logging.level.com.capstone.realestate=DEBUG
